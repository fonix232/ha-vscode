worker_processes 1;
daemon off;
error_log stderr warn;
pid /run/nginx-vscode.pid;

events {
    worker_connections 1024;
}

http {
    access_log off;

    # WebSocket upgrade mapping
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 1337;

        location / {
            proxy_pass http://127.0.0.1:1338;
            proxy_http_version 1.1;

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;

            # Long-lived connections (terminal, extension host)
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            # Stream responses (terminal output, large file transfers)
            proxy_buffering off;

            # -------------------------------------------------------
            # Strip the Set-Cookie headers emitted by the VS Code CLI
            # proxy (vscode-secret-key-path and vscode-cli-secret-half).
            #
            # Root cause: HA Supervisor strips the ingress URL prefix
            # before forwarding to the add-on, so the mint-key endpoint
            # path stored in the vscode-secret-key-path cookie is never
            # reachable.  The workbench therefore receives a 404 when it
            # tries to derive the AES key, which causes it to wipe the
            # entire localStorage secrets store on every page load
            # (GitHub Copilot auth, etc.).
            #
            # Without this cookie, VS Code falls back to storing secrets
            # server-side via the remote extension host – which IS
            # persistent across page loads because it lives in
            # /data/vscode/server-data on the add-on's data volume.
            # -------------------------------------------------------
            proxy_hide_header Set-Cookie;
        }
    }
}
