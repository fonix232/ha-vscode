---
name: VS Code (Microsoft)
version: 1.119.1.0
slug: vscode-microsoft
description: >-
  Microsoft Visual Studio Code in the browser, integrated into
  the Home Assistant frontend. Supports all extensions including
  GitHub Copilot. Based on the Microsoft VS Code binary, not code-server.
url: https://github.com/fonix232/ha-vscode
image: ghcr.io/fonix232/ha-vscode-{arch}
ingress: true
ingress_port: 1337
ingress_stream: true
panel_icon: mdi:microsoft-visual-studio-code
startup: services
init: false
arch:
  - aarch64
  - amd64
hassio_api: true
hassio_role: manager
homeassistant_api: true
map:
  - type: addons
    read_only: false
  - type: all_addon_configs
    read_only: false
  - type: backup
    read_only: false
  - type: homeassistant_config
    read_only: false
    path: /config
  - type: media
    read_only: false
  - type: share
    read_only: false
  - type: ssl
    read_only: false
options:
  tunnel_enabled: false
  packages: []
  init_commands: []
schema:
  log_level: list(trace|debug|info|warning|error|fatal)?
  config_path: str?
  tunnel_enabled: bool?
  packages:
    - str
  init_commands:
    - str
